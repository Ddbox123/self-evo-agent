[pytest]
# 测试发现路径
testpaths = tests

# 测试文件匹配规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 排除目录（backups 包含 18 个引用已删除模块的测试文件）
norecursedirs = tests/backups .venv .git __pycache__ node_modules

# 自定义 markers
markers =
    unit: 单元测试（无 I/O，无单例，快速）
    integration: 集成测试（需要文件系统、SQLite、单例）
    e2e: 端到端测试（需要真实 LLM）
    slow: 慢速测试（超过 2 秒）
    infrastructure: core/infrastructure/ 模块测试
    orchestration: core/orchestration/ 模块测试
    tools: tools/ 模块测试
    config: config/ 模块测试

# 默认选项
addopts = -v -x --tb=short --strict-markers --no-header
