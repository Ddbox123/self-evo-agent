# Self-Evolving Agent 配置文件
# 所有参数都在此文件中配置，无需使用环境变量

# ============================================================
# 大语言模型配置 (阿里云百炼)
# ============================================================
[llm]
# 提供商：aliyun, openai, anthropic, deepseek 等
provider = "aliyun"
# 模型名称（阿里云百炼模型列表: https://help.aliyun.com/model-studio/getting-started/models）
# 推荐: qwen-plus, qwen-turbo, qwen-max, qwen-coder-plus
model_name = "qwen-32b-awq"
# API Key（直接从阿里云百炼控制台获取）
# api_key = "sk-50d93a5673154076b3f1a19bd58e7e4f"
api_key ="EMPTY"
# API 端点
api_base = "http://localhost:8000/v1"
# 温度参数 (0.0-2.0)
temperature = 0.2
# 最大输出 tokens
max_tokens = 4096
# API 超时时间（秒）
api_timeout = 60

# ============================================================
# Agent 行为配置
# ============================================================
[agent]
# Agent 名称
name = "SelfEvolvingAgent"
# 工作区域 - 所有生成的文件都在此目录下（相对于项目根目录）
workspace = "workspace"
# 苏醒间隔（秒）- Agent 每隔多久苏醒一次进行思考
# 建议：简单任务用 60 秒，复杂任务用 300 秒
awake_interval = 1
# 单次苏醒的最大工具调用次数
max_iterations = 100
# 最大运行时间（秒），0 表示无限制
max_runtime = 0
# 是否自动备份
auto_backup = true
# 自动备份间隔（秒）
backup_interval = 3000
# 自动重启阈值，0 表示不自动重启
auto_restart_threshold = 0

# ============================================================
# 上下文压缩配置
# ============================================================
[context_compression]
# 启用运行时上下文压缩
enabled = true
# Token 阈值，超过此值触发压缩（建议设为模型 context window 的 50-70%）
max_token_limit = 20000
# 保留最近的工具调用次数（让模型知道自己最近在干嘛）
keep_recent_steps = 2
# 压缩摘要的最大字数
summary_max_chars = 200
# 压缩用模型（建议用更轻量的模型以节省成本）
compression_model = "qwen-32b-awq"

# ============================================================
# 工具配置
# ============================================================
[tools]
# 是否启用网络搜索
web_search_enabled = true
# 是否启用文件编辑
file_edit_enabled = true
# 是否启用语法检查
syntax_check_enabled = true
# 是否允许自我重启
restart_enabled = true

# ============================================================
# 日志配置
# ============================================================
[log]
# 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "INFO"
# 是否写入文件
file_enabled = false

# ============================================================
# 网络配置
# ============================================================
[network]
# 请求超时（秒）
timeout = 30
# 最大重试次数
max_retries = 3
# User-Agent
user_agent = "Mozilla/5.0 (compatible; SelfEvolvingAgent/1.0)"
